name: Auto Assign

on:
  issues:
    types: [opened]

jobs:
  auto-assign:
    name: Assign maintainer to issues
    runs-on: ubuntu-latest
    permissions:
      issues: write

    steps:
    - uses: actions/github-script@v8
      with:
        script: |
          // Only assign maintainer to issues (not external PRs)
          await github.rest.issues.addAssignees({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: context.issue.number,
            assignees: ['nelsonramosua']
          });