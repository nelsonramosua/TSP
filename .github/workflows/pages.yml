name: Deploy GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - '.github/workflows/docs/**'
      - 'README.md'
      - 'CHANGELOG.md'
      - '.github/CONTRIBUTING.md'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    name: Build Site
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Pages
      uses: actions/configure-pages@v5

    - name: Prepare docs for Jekyll
      run: |
        # Create folder
        mkdir -p docs

        # Funç to add Front Matter
        prepare_file() {
          local file=$1
          local title=$2
          local dest="docs/$(basename $file)"
          echo "---" > "$dest"
          echo "layout: default" >> "$dest"
          echo "title: $title" >> "$dest"
          echo "---" >> "$dest"
          echo "" >> "$dest"
          cat "$file" >> "$dest"
        }

        prepare_file "README.md" "Home"
        prepare_file "CHANGELOG.md" "Changelog"
        prepare_file "ARCHITECTURE.md" "Architecture"
        prepare_file ".github/CONTRIBUTING.md" "Contributing"

    - name: Build Jekyll site
      uses: actions/jekyll-build-pages@v1
      with:
        source: ./docs
        destination: ./_site

    - name: Upload Pages artifact
      uses: actions/upload-pages-artifact@v3

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4