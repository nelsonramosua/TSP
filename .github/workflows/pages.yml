name: Deploy GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'docs/ARCHITECTURE.md'
      - '.github/workflows/docs/**'
      - 'README.md'
      - 'CHANGELOG.md'
      - '.github/CONTRIBUTING.md'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    name: Build Site
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Pages
      uses: actions/configure-pages@v5

    - name: Prepare docs for Jekyll
      run: |
        mkdir -p temp_processing
        mkdir -p docs
        
        prepare_file() {
          local src_path=$1
          local title=$2
          local filename=$(basename "$src_path")
          local final_dest="docs/$filename"
          
          # 1. Locate real source
          if [ -f "$src_path" ]; then
            REAL_SRC="$src_path"
          elif [ -f "docs/$filename" ]; then
            cp "docs/$filename" "temp_processing/${filename}.raw"
            REAL_SRC="temp_processing/${filename}.raw"
          else
            echo "Warning: $filename not found. Skipping."
            return
          fi

          # 2. Start writing to temp file
          {
            echo "---"
            echo "layout: default"
            echo "title: $title"
            if [[ "$filename" == "ARCHITECTURE.md" ]]; then
              echo "mermaid: true"
            fi
            echo "---"
            echo ""
          } > "temp_processing/$filename"
          
          # 3. Use SED to fix image paths (removes 'docs/' from image links)
          sed 's|\](docs/|\](|g' "$REAL_SRC" >> "temp_processing/$filename"
          
          # 4. Move to final destination
          mv "temp_processing/$filename" "$final_dest"
          echo "Successfully prepared $final_dest"
        }

        prepare_file "README.md" "Home"
        prepare_file "CHANGELOG.md" "Changelog"
        prepare_file "ARCHITECTURE.md" "Architecture"
        prepare_file ".github/CONTRIBUTING.md" "Contributing"

    - name: Build Jekyll site
      uses: actions/jekyll-build-pages@v1
      with:
        source: ./docs
        destination: ./_site

    - name: Upload Pages artifact
      uses: actions/upload-pages-artifact@v4

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4