name: Deploy GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'docs/ARCHITECTURE.md'
      - '.github/workflows/docs/**'
      - 'README.md'
      - 'CHANGELOG.md'
      - '.github/CONTRIBUTING.md'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    name: Build Site
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Pages
      uses: actions/configure-pages@v5

    - name: Prepare docs for Jekyll
      run: |
        mkdir -p temp_processing
        mkdir -p docs
        
        prepare_file() {
          local src_path=$1
          local title=$2
          local filename=$(basename "$src_path")
          local final_dest="docs/$filename"
          
          echo "Checking $src_path..."
          
          if [ -f "$src_path" ]; then
            REAL_SRC="$src_path"
          elif [ -f "docs/$filename" ]; then
            REAL_SRC="docs/$filename"
          else
            echo "Warning: $filename not found. Skipping."
            return
          fi

          TMP_FILE="temp_processing/$filename"
          echo "---" > "$TMP_FILE"
          echo "layout: default" >> "$TMP_FILE"
          echo "title: $title" >> "$TMP_FILE"
          
          if [[ "$filename" == "ARCHITECTURE.md" ]]; then
            echo "mermaid: true" >> "$TMP_FILE"
          fi
          
          echo "---" >> "$TMP_FILE"
          echo "" >> "$TMP_FILE"
          cat "$REAL_SRC" >> "$TMP_FILE"
          
          mv "$TMP_FILE" "$final_dest"
          echo "Successfully prepared $final_dest"
        }

        prepare_file "README.md" "Home"
        prepare_file "CHANGELOG.md" "Changelog"
        prepare_file "ARCHITECTURE.md" "Architecture"
        prepare_file ".github/CONTRIBUTING.md" "Contributing"

    - name: Build Jekyll site
      uses: actions/jekyll-build-pages@v1
      with:
        source: ./docs
        destination: ./_site

    - name: Upload Pages artifact
      uses: actions/upload-pages-artifact@v3

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4