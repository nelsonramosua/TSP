# Label configuration for auto-labeler
# Maps labels to file path patterns.

exact-algorithm:
  - implementations/exact/**

heuristic:
  - implementations/heuristics/**

metaheuristic:
  - implementations/metaheuristics/**

graph-utils:
  - implementations/graph/**
  - headers/Graph.h
  - headers/NamedGraph.h
  - headers/HashMap.h
  - headers/SortedList.h

lower-bounds:
  - implementations/lowerBounds/**
