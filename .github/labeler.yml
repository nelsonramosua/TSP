# Label configuration for auto-labeler (v5 compatible)

exact-algorithm:
  - changed-files:
    - any-glob-to-any-file: implementations/exact/**

heuristic:
  - changed-files:
    - any-glob-to-any-file: implementations/heuristics/**

metaheuristic:
  - changed-files:
    - any-glob-to-any-file: implementations/metaheuristics/**

graph-utils:
  - changed-files:
    - any-glob-to-any-file:
      - implementations/graph/**
      - headers/Graph.h
      - headers/NamedGraph.h
      - headers/HashMap.h
      - headers/SortedList.h

lower-bounds:
  - changed-files:
    - any-glob-to-any-file:
      - implementations/lowerBounds/**
      - headers/LowerBounds.h

mst:
  - changed-files:
    - any-glob-to-any-file: implementations/mst/**

test-driver:
  - changed-files:
    - any-glob-to-any-file:
      - TSPTest.c
      - headers/TSPTest.h

graph-factory:
  - changed-files:
    - any-glob-to-any-file:
      - GraphFactory.c
      - headers/GraphFactory.h

tour:
  - changed-files:
    - any-glob-to-any-file: Tour.c

build:
  - changed-files:
    - any-glob-to-any-file: Makefile

documentation:
  - changed-files:
    - any-glob-to-any-file:
      - README.md
      - docs/**
      - "*.md"

ci-cd:
  - changed-files:
    - any-glob-to-any-file: .github/**